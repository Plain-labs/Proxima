name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Soroban Contracts ──────────────────────────────────────────────────────
  contracts:
    name: Contracts (Rust/Soroban)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Install system dependencies for Soroban CLI
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config libudev-dev

      - name: Install Soroban CLI
        run: |
          STELLAR_CLI_VERSION="27.0.0"
          curl -sSL "https://github.com/stellar/stellar-cli/releases/download/v${STELLAR_CLI_VERSION}/stellar-cli-v${STELLAR_CLI_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /usr/local/bin
          stellar --version

      - name: Check formatting
        working-directory: contracts
        run: cargo fmt -- --check

      - name: Run Clippy
        working-directory: contracts
        run: cargo clippy --all-targets --features testutils -- -D warnings

      - name: Run tests
        working-directory: contracts
        run: cargo test --features testutils

      - name: Build WASM
        working-directory: contracts
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contract-wasm
          path: contracts/target/wasm32-unknown-unknown/release/*.wasm

  # ── TypeScript SDK ─────────────────────────────────────────────────────────
  sdk:
    name: SDK (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        working-directory: sdk
        run: bun run typecheck

      - name: Lint
        working-directory: sdk
        run: bun run lint

      - name: Run tests
        working-directory: sdk
        run: bun run test

      - name: Build
        working-directory: sdk
        run: bun run build

  # ── Dashboard ──────────────────────────────────────────────────────────────
  dashboard:
    name: Dashboard (React)
    runs-on: ubuntu-latest
    needs: [sdk]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build SDK first
        working-directory: sdk
        run: bun run build

      - name: Build dashboard
        working-directory: dashboard
        run: bun run build

      - name: Upload dashboard build
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/dist/
