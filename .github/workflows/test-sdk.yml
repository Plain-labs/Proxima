name: SDK Tests

# Run SDK tests on any push/PR that touches TypeScript code.

on:
  push:
    paths:
      - 'sdk/**'
      - 'dashboard/**'
      - '.github/workflows/test-sdk.yml'
  pull_request:
    paths:
      - 'sdk/**'
      - 'dashboard/**'
      - '.github/workflows/test-sdk.yml'

jobs:
  sdk:
    name: SDK — Type Check, Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install SDK dependencies
        working-directory: sdk
        run: bun install --frozen-lockfile

      - name: Type check
        working-directory: sdk
        run: bun run typecheck

      - name: Lint
        working-directory: sdk
        run: bun run lint

      - name: Run tests
        working-directory: sdk
        run: bun test

      - name: Build
        working-directory: sdk
        run: bun run build

      - name: Verify dist exports
        working-directory: sdk
        run: node -e "const sdk = require('./dist/index.js'); console.log('SDK exports:', Object.keys(sdk).join(', '))"

  dashboard:
    name: Dashboard — Type Check & Build
    runs-on: ubuntu-latest
    needs: sdk

    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Build SDK first
        working-directory: sdk
        run: bun run build

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: bun install --frozen-lockfile

      - name: Type check dashboard
        working-directory: dashboard
        run: bunx tsc --noEmit

      - name: Build dashboard
        working-directory: dashboard
        run: bun run build

      - name: Check bundle size
        run: |
          TOTAL=$(du -sb dashboard/dist | cut -f1)
          echo "Dashboard bundle size: ${TOTAL} bytes ($(( TOTAL / 1024 ))KB)"
          if [ "$TOTAL" -gt 5242880 ]; then
            echo "::warning::Dashboard bundle exceeds 5MB. Consider code splitting."
          fi

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist-${{ github.sha }}
          path: dashboard/dist/
          retention-days: 7
